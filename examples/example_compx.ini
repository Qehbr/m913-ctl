# m913-ctl configuration — Compx hardware (VID 3554)
# Apply with: m913-ctl --config examples/example_compx.ini
#
# This example targets the newer Compx variant of the M913
# (USB 3554:f55d wireless / 3554:f55e wired), which differs from the
# original Areson hardware in two ways:
#   * DPI values are in steps of 50 (not 100)
#   * LED is per DPI stage — each DPI slot has its own RGB color,
#     instead of global LED modes (off/steady/respiration/rainbow)
#
# Lines starting with # or ; are comments.

# -------------------------------------------------------------------------
# Mouse hardware settings
# polling_rate: USB report rate in Hz — 125, 250, 500, or 1000
# -------------------------------------------------------------------------
[mouse]
polling_rate=1000

# -------------------------------------------------------------------------
# DPI stages (5 slots, multiples of 50)
# dpiN        : DPI value for slot N
# dpiN_enable : 0 disables the slot. Hardware limitation — stages can only
#               be disabled from the top down (disabling slot 2 also
#               disables 3, 4, 5). To use a single stage, set dpi2_enable=0.
# dpiN_color  : LED color for that DPI stage, hex RGB (000000 = LED off)
# -------------------------------------------------------------------------
[dpi]
dpi1=400
dpi1_color=ff0000
dpi2=800
dpi2_color=0000ff
dpi3=1600
dpi3_color=00ff00
dpi4=2400
dpi4_color=ff8000
dpi5=3200
dpi5_color=ff00ff

# -------------------------------------------------------------------------
# LED — to turn all stages off, set every dpiN_color to 000000, or use the
# [led] section below to apply one color (or off) to all active stages.
# Per-slot dpiN_color above takes precedence over this.
# -------------------------------------------------------------------------
# [led]
# mode=off

# -------------------------------------------------------------------------
# Button mappings (same names as the original hardware — the tool handles
# the Compx button layout internally)
# -------------------------------------------------------------------------
[buttons]
button_left=left
button_right=right
button_middle=middle
button_fire=fire:25:3

button_side1=q
button_side2=w
button_side3=e
button_side4=a
button_side5=s
button_side6=d
button_side7=z
button_side8=x
button_side9=c
button_side10=r
button_side11=t
button_side12=y
